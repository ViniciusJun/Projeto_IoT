# Servidor
server.port=8080

# Banco de Dados H2 (para desenvolvimento)
spring.datasource.url=jdbc:h2:file:./data/iotdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# MQTT Configuration
mqtt.broker.url=tcp://localhost:1883
mqtt.client.id=backend-iot-${random.value}
mqtt.topics=casa/sensores/agua,casa/sensores/energia,casa/sensores/gas

# Logging
logging.level.com.iot.backend=DEBUG
logging.level.org.springframework.integration=INFO

# WebSocket
websocket.endpoint=/ws

# Limites para Alertas
alerta.agua.vazamento-noturno=2.0
alerta.agua.vazamento-maximo=20.0
alerta.energia.sobrecarga=3000
alerta.energia.pico-tensao=240
alerta.gas.alerta-amarelo=100
alerta.gas.alerta-vermelho=200

# Dicas de Economia
dicas.agua.tempo-banho-ideal=8
dicas.agua.temperatura-chuveiro-ideal=38
dicas.energia.modulo-ativado=true
